name: Reset adapter versions (one-off)

# Manual only. Assumes 0.3.0 is already published (by the Release workflow).
# Points `latest` at 0.3.0 for each adapter, then removes the stray 2.x versions.
on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Point latest at 0.3.0 and drop 2.x
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          for p in nominee-ai nominee-eve nominee-auth0; do
            echo "== $p =="
            npm dist-tag add "$p@0.3.0" latest || echo "dist-tag failed for $p"
            npm unpublish "$p@2.0.0" --force || echo "unpublish 2.0.0 failed for $p"
            npm unpublish "$p@2.0.1" --force || echo "unpublish 2.0.1 failed for $p"
          done
          echo "== resulting versions =="
          for p in nominee nominee-ai nominee-eve nominee-auth0; do echo -n "$p: "; npm view "$p" version; done
