name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "!site/agent-worker/**" # the Worker has its own deploy-worker.yml
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Publish to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npx --yes wrangler@4 pages deploy site --project-name=nominee-dev --branch=main
      - name: Note missing token
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "::warning::Set the CLOUDFLARE_API_TOKEN repo secret to enable auto-deploy."
