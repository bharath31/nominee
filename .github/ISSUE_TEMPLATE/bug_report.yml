name: Bug report
description: Something isn't working as documented
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - nominee (core)
        - nominee-ai
        - nominee-eve
        - nominee-auth0
        - not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. 0.3.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: A minimal code snippet or repo that reproduces the issue.
      render: typescript
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: "Node 22 / Cloudflare Workers / Bun / …"
  - type: checkboxes
    id: not-security
    attributes:
      label: Confirm
      options:
        - label: This is not a security vulnerability (those go to SECURITY.md, not public issues).
          required: true
