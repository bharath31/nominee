<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A1020"/><stop offset="1" stop-color="#0B1226"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#D9A441" stop-opacity="0.18"/><stop offset="1" stop-color="#D9A441" stop-opacity="0"/>
    </radialGradient>
    <pattern id="engrave" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="#D9A441" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <style>
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#engrave)"/>
  <rect x="32" y="32" width="1136" height="566" rx="8" fill="none" stroke="#E8ECF6" stroke-opacity="0.12"/>
  <rect x="40" y="40" width="1120" height="550" rx="6" fill="none" stroke="#D9A441" stroke-opacity="0.16"/>

  <!-- seal -->
  <g transform="translate(940 315)">
    <circle r="190" fill="url(#glow)"/>
    <g fill="none" stroke="#D9A441" stroke-opacity="0.4" stroke-width="1">
      <ellipse rx="140" ry="38" transform="rotate(0)"/>
      <ellipse rx="140" ry="38" transform="rotate(45)"/>
      <ellipse rx="140" ry="38" transform="rotate(90)"/>
      <ellipse rx="140" ry="38" transform="rotate(135)"/>
      <ellipse rx="140" ry="70" transform="rotate(22.5)"/>
      <ellipse rx="140" ry="70" transform="rotate(112.5)"/>
    </g>
    <circle r="148" fill="none" stroke="#D9A441" stroke-opacity="0.6"/>
    <circle r="92" fill="none" stroke="#D9A441" stroke-opacity="0.45"/>
    <circle r="92" fill="#0A1020" fill-opacity="0.55"/>
    <text class="sans" x="0" y="34" text-anchor="middle" font-size="110" font-weight="600" fill="#E8ECF6" letter-spacing="-3">n</text>
  </g>

  <text class="mono" x="80" y="150" font-size="18" letter-spacing="4" fill="#D9A441" fill-opacity="0.95">IDENTITY · TOKEN DELEGATION</text>
  <text class="sans" x="76" y="290" font-size="130" font-weight="600" letter-spacing="-5" fill="#E8ECF6">nominee</text>
  <text class="sans" x="80" y="350" font-size="30" fill="#7E8BA6">Fresh tokens &amp; human approval for</text>
  <text class="sans" x="80" y="392" font-size="30" fill="#7E8BA6">agents that act for your users.</text>

  <g class="mono" font-size="20" transform="translate(80 470)">
    <text x="0" y="0" fill="#AEB9D0">you</text>
    <text x="64" y="0" fill="#D9A441">&#8594;</text>
    <text x="98" y="0" fill="#AEB9D0">agent</text>
    <text x="190" y="0" fill="#D9A441">&#8594;</text>
    <text x="224" y="0" fill="#AEB9D0">service</text>
  </g>

  <g transform="translate(80 510)">
    <rect width="320" height="58" rx="12" fill="#D9A441" fill-opacity="0.08" stroke="#D9A441" stroke-opacity="0.55"/>
    <text class="mono" x="26" y="38" font-size="26" fill="#E8ECF6"><tspan fill="#D9A441">›</tspan>  npm i nominee</text>
  </g>
</svg>
