name = "nominee-cf-agent-demo"
main = "src/index.ts"
compatibility_date = "2026-06-20"
compatibility_flags = ["nodejs_compat"]

# Serve the testbed under the existing domain at nominee.dev/agent
routes = [{ pattern = "nominee.dev/agent*", zone_name = "nominee.dev" }]

[ai]
binding = "AI"

# Built-in rate limiting (no KV/resource needed): 3 sends per 60s per IP
[[ratelimits]]
name = "EMAIL_RL"
namespace_id = "1001"
simple = { limit = 3, period = 60 }

[vars]
FROM = "nominee <agent@email.nominee.dev>"
# Set the secret with:  wrangler secret put RESEND_API_KEY
